name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "dev-ledger/**"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore: ["**.md", "docs/**", "dev-ledger/**"]

# Supersede in-flight runs when an agent pushes again to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Skip while a PR is a draft; always run on pushes to main.
    if: ${{ github.event_name == 'push' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # mythings-core is a sibling repo, not on PyPI — pull it from the same owner.
      - name: Install mythings-core
        run: pip install "mythings-core @ git+https://github.com/${{ github.repository_owner }}/mythings-core@main"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Tests
        run: pytest
